<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Shoko Sonarr — Missing Episodes</title>
  <link rel="stylesheet" href="dashboard/dashboard.css" />
</head>
<body>
  <header>
    <div class="title-group">
      <h1>Missing Episodes</h1>
      <span id="connection-health" class="health-indicator" title="Sonarr connection status">
        <span class="health-dot"></span><span class="health-label">Checking…</span>
      </span>
    </div>
    <div class="actions">
      <button id="scan-now" class="primary">Scan Now</button>
      <label class="live-refresh"><input id="live-refresh" type="checkbox" /> Live Refresh</label>
      <button id="open-pending">Pending Searches</button>
      <button id="open-history">History</button>
      <button id="open-suggestions">Suggestions</button>
      <button id="open-settings">Settings</button>
      <button id="sync-tags">Sync Tags</button>
    </div>
  </header>

  <section id="settings-panel" class="panel hidden">
    <div class="settings-section">
      <h2>Sonarr Connection</h2>
      <div class="settings-grid">
        <label>Base URL <input id="settings-url" type="text" placeholder="http://192.168.1.40:8989" /></label>
        <label>API Key <input id="settings-key" type="password" /></label>
        <label>Quality Profile <select id="settings-quality-profile"></select></label>
        <label>Root Folder <select id="settings-root-folder"></select></label>
      </div>
      <div class="actions">
        <button id="test-connection">Test Connection</button>
      </div>
    </div>

    <div class="settings-section">
      <h2>Radarr Connection</h2>
      <div class="settings-grid">
        <label>Base URL <input id="radarr-settings-url" type="text" placeholder="http://192.168.1.60:7878" /></label>
        <label>API Key <input id="radarr-settings-key" type="password" /></label>
        <label>Quality Profile <select id="radarr-settings-quality-profile"></select></label>
        <label>Root Folder <select id="radarr-settings-root-folder"></select></label>
      </div>
      <div class="actions">
        <button id="radarr-test-connection">Test Connection</button>
      </div>
    </div>

    <div class="settings-section">
      <h2>Plugin Settings</h2>
      <div class="settings-grid">
        <label>Scan Interval (hours) <input id="settings-interval" type="number" min="0" /></label>
        <label>Theme
          <select id="theme-select">
            <optgroup label="Auto">
              <option value="system">System</option>
            </optgroup>
            <optgroup label="Dark">
              <option value="ember-dark">Ember</option>
              <option value="teal-dark">Deep Teal</option>
              <option value="shoko-aniblackle">AniBlackle</option>
            </optgroup>
            <optgroup label="Light">
              <option value="paper-light">Paper</option>
            </optgroup>
          </select>
        </label>
        <label><input id="settings-include-specials" type="checkbox" /> Include Specials</label>
        <label><input id="settings-hide-unaired" type="checkbox" /> Hide Unaired Episodes</label>
        <label>Notification Webhook URL <input id="settings-webhook" type="password" placeholder="Discord-compatible webhook (optional)" /></label>
      </div>
    </div>

    <div class="actions">
      <button id="save-settings" class="primary">Save</button>
    </div>
    <p id="settings-status"></p>
  </section>

  <section id="pending-panel" class="panel hidden">
    <h2>Pending Sonarr Searches</h2>
    <div id="pending-list"></div>
  </section>

  <section id="history-panel" class="panel hidden">
    <h2>Search History</h2>
    <div id="history-list"></div>
  </section>

  <section id="suggestions-panel" class="panel hidden">
    <h2>Related Series You Don't Own</h2>
    <div id="suggestions-list"></div>
  </section>

  <div id="bulk-actions-bar" class="hidden">
    <span id="bulk-selected-count"></span>
    <button id="bulk-select-all">Select all</button>
    <button id="bulk-clear">Clear</button>
    <button id="bulk-include-specials">Include Specials</button>
    <button id="bulk-exclude-specials">Exclude Specials</button>
    <button id="bulk-add-and-search" class="primary">Add to Sonarr / Search</button>
  </div>

  <section id="series-list"></section>

  <script src="dashboard/dashboard.js"></script>
</body>
</html>
